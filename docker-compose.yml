version: "3.8"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: 40bierges-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:-changeme_in_production}
      - DB_PATH=/app/data/database.sqlite
      - NODE_ENV=production
    volumes:
      - api-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./40bierges
      dockerfile: Dockerfile
    container_name: 40bierges-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
    driver: local
